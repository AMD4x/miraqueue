name: Bug report
description: Report a reproducible MiraQueue problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: MiraQueue version
      placeholder: V1.0.0
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
