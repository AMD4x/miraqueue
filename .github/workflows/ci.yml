name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Static repository checks
        shell: pwsh
        run: ./tests/Test-MiraQueueStatic.ps1
      - name: Version consistency
        shell: pwsh
        run: ./tests/Test-VersionConsistency.ps1
      - name: Documentation links
        shell: pwsh
        run: ./tests/Test-DocsLinks.ps1
      - name: Function documentation coverage
        shell: pwsh
        run: ./tools/Test-DocumentationCoverage.ps1
